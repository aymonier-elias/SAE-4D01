name: Sync all branches when main is updated

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into all branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for branch in elias-branch ines-branch florian-branch joel-branch; do
            echo "🔄 Mise à jour de la branche $branch avec main"
            git fetch origin $branch
            git checkout $branch
            git merge origin/main --no-edit || true
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:$branch || true
          done
